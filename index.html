<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine Core Admin | Powered by Alpine Virtual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #f9fafb; color: #111827; }
        .sidebar-dark { background: #0f172a; }
        .nav-link { transition: all 0.2s; border-radius: 12px; margin: 4px 12px; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-active { background: #3b82f6 !important; color: #fff !important; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .glass-card { background: white; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-radius: 24px; }
        .btn-punch { transition: all 0.2s; border-radius: 16px; font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        .btn-punch:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .btn-punch:disabled { opacity: 0.3; cursor: not-allowed; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('Time');
            
            // --- SHARED STATE (Simulating a Database) ---
            const [staff, setStaff] = useState([
                { id: 1, name: "Sarah Miller", role: "Executive VA", rate: 25, hours: 40 },
                { id: 2, name: "Marcus Wright", role: "Operations Lead", rate: 35, hours: 38 }
            ]);
            
            const [leaves, setLeaves] = useState([
                { id: 101, staffId: 1, type: "Sick Leave", date: "2026-03-22", status: "Approved" }
            ]);

            const [punches, setPunches] = useState([]);
            const [clockState, setClockState] = useState('OUT'); // OUT, IN, BREAK, LUNCH

            useEffect(() => { window.lucide?.createIcons(); }, [activeTab, clockState, staff, leaves, punches]);

            // --- HCM LOGIC ---
            const addStaff = () => {
                const name = prompt("Associate Name:");
                const role = prompt("Role:");
                if(name && role) setStaff([...staff, { id: Date.now(), name, role, rate: 20, hours: 0 }]);
            };

            // --- ABSENCE LOGIC ---
            const requestLeave = () => {
                const type = prompt("Leave Type (Vacation/Sick):");
                if(type) setLeaves([{ id: Date.now(), staffId: 1, type, date: "2026-04-05", status: "Pending" }, ...leaves]);
            };

            // --- TIME LOGIC ---
            const handlePunch = (action) => {
                const time = new Date().toLocaleTimeString();
                setPunches([{ action, time }, ...punches]);
                if (action === 'IN' || action.includes('OUT')) setClockState(action === 'OUT' ? 'OUT' : 'IN');
                else setClockState(action.split(' ')[0]);
            };

            // --- PAYROLL CALCULATION ---
            const getPayroll = (s) => {
                const staffLeaves = leaves.filter(l => l.staffId === s.id && l.status === 'Approved').length;
                const gross = (s.hours * s.rate) - (staffLeaves * 8 * s.rate);
                return { gross, leaves: staffLeaves };
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-72 sidebar-dark text-slate-400 flex flex-col shrink-0">
                        <div className="p-10 border-b border-white/5 flex items-center gap-4">
                            <div className="h-10 w-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-600/20">
                                <i data-lucide="mountain"></i>
                            </div>
                            <div>
                                <h1 className="text-white font-800 text-lg tracking-tight">ALPINE</h1>
                                <p className="text-[9px] font-bold text-blue-400 tracking-[0.2em] uppercase">Core Admin</p>
                            </div>
                        </div>

                        <nav className="mt-8 flex-1 space-y-1">
                            {[
                                { id: 'HCM', icon: 'users', label: 'HCM Portal' },
                                { id: 'Absence', icon: 'calendar-days', label: 'Absence Mgmt' },
                                { id: 'Time', icon: 'timer', label: 'Timekeeping' },
                                { id: 'Payroll', icon: 'banknote', label: 'Payroll & QB' }
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)}
                                    className={`w-[calc(100%-24px)] flex items-center px-5 py-4 nav-link text-xs font-700 uppercase tracking-widest ${activeTab === item.id ? 'nav-active' : ''}`}>
                                    <i data-lucide={item.icon} className="w-4 h-4 mr-4"></i> {item.label}
                                </button>
                            ))}
                        </nav>
                        
                        <div className="p-8 border-t border-white/5 italic text-[10px] text-slate-500">
                            v4.0 Proof of Concept<br/>Sub: Alpine Virtual
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <header className="h-20 bg-white border-b border-slate-100 flex items-center justify-between px-10 shrink-0 sticky top-0 z-10">
                            <div className="flex items-center gap-2 text-[10px] font-800 text-slate-300 tracking-widest uppercase">
                                <span>Operations</span> <i data-lucide="chevron-right" className="w-3 h-3"></i> <span className="text-slate-900">{activeTab}</span>
                            </div>
                            <div className="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-full border border-emerald-100 text-[10px] font-800 flex items-center gap-2">
                                <div className="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div> QB SYNC ACTIVE
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-10">
                            {/* MODULE: TIMEKEEPING */}
                            {activeTab === 'Time' && (
                                <div className="max-w-4xl mx-auto space-y-10 animate-in fade-in duration-700">
                                    <div className="text-center">
                                        <h2 className="text-7xl font-800 text-slate-900 tracking-tighter mb-4 tabular-nums">
                                            {new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                        </h2>
                                        <div className="inline-block px-4 py-1 bg-slate-100 rounded-full text-[10px] font-800 text-slate-500 tracking-widest uppercase">
                                            Status: <span className="text-blue-600 underline">{clockState}</span>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                        <button onClick={() => handlePunch('IN')} disabled={clockState !== 'OUT'} className="btn-punch bg-white p-8 glass-card flex flex-col items-center gap-3 text-emerald-600 border-b-4 border-emerald-500">
                                            <i data-lucide="play" className="w-6 h-6"></i> Clock In
                                        </button>
                                        <button onClick={() => handlePunch('BREAK IN')} disabled={clockState !== 'IN'} className="btn-punch bg-white p-8 glass-card flex flex-col items-center gap-3 text-amber-600 border-b-4 border-amber-500">
                                            <i data-lucide="coffee" className="w-6 h-6"></i> Break In
                                        </button>
                                        <button onClick={() => handlePunch('BREAK OUT')} disabled={clockState !== 'BREAK'} className="btn-punch bg-white p-8 glass-card flex flex-col items-center gap-3 text-amber-600 border-b-4 border-amber-500">
                                            <i data-lucide="log-in" className="w-6 h-6 rotate-180"></i> Break Out
                                        </button>
                                        <button onClick={() => handlePunch('LUNCH IN')} disabled={clockState !== 'IN'} className="btn-punch bg-white p-8 glass-card flex flex-col items-center gap-3 text-orange-600 border-b-4 border-orange-500">
                                            <i data-lucide="utensils" className="w-6 h-6"></i> Lunch In
                                        </button>
                                        <button onClick={() => handlePunch('LUNCH OUT')} disabled={clockState !== 'LUNCH'} className="btn-punch bg-white p-8 glass-card flex flex-col items-center gap-3 text-orange-600 border-b-4 border-orange-500">
                                            <i data-lucide="clock-9" className="w-6 h-6"></i> Lunch Out
                                        </button>
                                        <button onClick={() => handlePunch('OUT')} disabled={clockState === 'OUT'} className="btn-punch bg-slate-900 p-8 rounded-[24px] flex flex-col items-center gap-3 text-white border-b-4 border-rose-500">
                                            <i data-lucide="square" className="w-6 h-6"></i> Clock Out
                                        </button>
                                    </div>

                                    <div className="glass-card overflow-hidden">
                                        <div className="px-8 py-4 bg-slate-50 border-b text-[10px] font-800 uppercase tracking-widest text-slate-400">Activity History</div>
                                        <div className="divide-y max-h-48 overflow-auto italic">
                                            {punches.length === 0 ? <p className="p-8 text-center text-slate-400 text-xs uppercase font-500">No punches found</p> : 
                                            punches.map((p, i) => (
                                                <div key={i} className="px-8 py-4 flex justify-between text-xs font-600">
                                                    <span>{p.action}</span><span className="text-slate-400 font-mono">{p.time}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* MODULE: HCM */}
                            {activeTab === 'HCM' && (
                                <div className="max-w-5xl mx-auto space-y-6 animate-in fade-in duration-700">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-3xl font-800 tracking-tighter">Staff Directory</h2>
                                        <button onClick={addStaff} className="bg-blue-600 text-white px-6 py-3 rounded-2xl text-xs font-700 uppercase tracking-widest hover:bg-blue-700 shadow-xl shadow-blue-600/20 transition-all">+ Add Associate</button>
                                    </div>
                                    <div className="glass-card overflow-hidden">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b text-[10px] font-800 uppercase tracking-widest text-slate-400">
                                                <tr><th className="px-8 py-4">Name</th><th className="px-8 py-4">Position</th><th className="px-8 py-4 text-right">Action</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {staff.map(s => (
                                                    <tr key={s.id} className="hover:bg-slate-50/50">
                                                        <td className="px-8 py-6 font-700 text-slate-900 italic">{s.name}</td>
                                                        <td className="px-8 py-6 text-sm text-slate-500 font-500">{s.role}</td>
                                                        <td className="px-8 py-6 text-right"><button onClick={() => setStaff(staff.filter(x => x.id !== s.id))} className="text-slate-300 hover:text-rose-500"><i data-lucide="trash-2" className="w-4 h-4"></i></button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* MODULE: ABSENCE */}
                            {activeTab === 'Absence' && (
                                <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in duration-700">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-3xl font-800 tracking-tighter">Leave Filing</h2>
                                        <button onClick={requestLeave} className="bg-slate-900 text-white px-6 py-3 rounded-2xl text-xs font-700 uppercase tracking-widest">+ New Request</button>
                                    </div>
                                    <div className="glass-card p-8 space-y-4">
                                        {leaves.map(l => (
                                            <div key={l.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                <div>
                                                    <p className="font-800 text-sm italic">{l.type}</p>
                                                    <p className="text-[10px] font-700 text-slate-400 uppercase tracking-widest">{l.date}</p>
                                                </div>
                                                <span className={`px-4 py-1 rounded-full text-[9px] font-800 uppercase tracking-widest ${l.status === 'Approved' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>{l.status}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* MODULE: PAYROLL */}
                            {activeTab === 'Payroll' && (
                                <div className="max-w-6xl mx-auto space-y-6 animate-in fade-in duration-700">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-3xl font-800 tracking-tighter">Payroll Ledger</h2>
                                        <button className="bg-[#2ca01c] text-white px-6 py-3 rounded-2xl text-xs font-800 uppercase tracking-widest shadow-xl shadow-green-600/20">Sync QuickBooks</button>
                                    </div>
                                    <div className="glass-card overflow-hidden">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b text-[10px] font-800 uppercase tracking-widest text-slate-400">
                                                <tr><th className="px-8 py-5">Associate</th><th className="px-8 py-5">Hours</th><th className="px-8 py-5">Deductions (Leaves)</th><th className="px-8 py-5 text-right">Gross Total</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-600 text-sm">
                                                {staff.map(s => {
                                                    const pay = getPayroll(s);
                                                    return (
                                                        <tr key={s.id} className="hover:bg-slate-50/50">
                                                            <td className="px-8 py-6 italic font-700">{s.name}</td>
                                                            <td className="px-8 py-6">{s.hours}h</td>
                                                            <td className="px-8 py-6">
                                                                <span className={pay.leaves > 0 ? "text-rose-500 font-800" : "text-slate-300"}>
                                                                    {pay.leaves > 0 ? `-${pay.leaves * 8}h Unpaid Leave` : 'None'}
                                                                </span>
                                                            </td>
                                                            <td className="px-8 py-6 text-right font-800 text-lg tracking-tighter">${pay.gross.toLocaleString()}</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
