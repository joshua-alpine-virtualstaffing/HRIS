<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine Core Admin | Powered by Alpine Virtual</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .alpine-nav-active { background: rgba(56, 189, 248, 0.1); border-left: 4px solid #38bdf8; color: #f8fafc !important; }
        .glass-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); }
        .btn-qb { background: #2ca01c; transition: all 0.2s; }
        .btn-qb:hover { background: #238016; transform: translateY(-1px); }
        .stat-card { transition: transform 0.2s ease; border: 1px solid #e2e8f0; }
        .stat-card:hover { transform: translateY(-3px); border-color: #38bdf8; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('HCM');
            
            // --- STATE: EMPLOYEES ---
            const [employees, setEmployees] = useState([
                { id: 1, name: "Sarah Miller", role: "Executive VA", dept: "Operations", rate: 25, hours: 40, absence: 0, status: "Active" },
                { id: 2, name: "Marcus Wright", role: "Success Manager", dept: "Client Relations", rate: 35, hours: 38, absence: 1, status: "Active" },
                { id: 3, name: "Jordan Lee", role: "Technical Lead", dept: "Engineering", rate: 50, hours: 42, absence: 0, status: "Active" }
            ]);

            // --- STATE: TIMEKEEPING ---
            const [isClockedIn, setIsClockedIn] = useState(false);
            const [sessionSeconds, setSessionSeconds] = useState(0);
            
            // --- STATE: PAYROLL ---
            const [syncingIds, setSyncingIds] = useState(new Set());
            const [syncedIds, setSyncedIds] = useState(new Set());

            useEffect(() => {
                let interval;
                if (isClockedIn) {
                    interval = setInterval(() => setSessionSeconds(s => s + 1), 1000);
                }
                const timer = setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
                return () => {
                    clearInterval(interval);
                    clearTimeout(timer);
                };
            }, [activeTab, isClockedIn, employees, syncedIds, syncingIds]);

            // --- LOGIC: CALCULATIONS ---
            const calculateGross = (rate, hours, absenceDays) => {
                const billableHours = hours - (absenceDays * 8);
                return billableHours * rate;
            };

            const formatDuration = (s) => {
                const h = Math.floor(s / 3600).toString().padStart(2, '0');
                const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
                const sec = (s % 60).toString().padStart(2, '0');
                return `${h}:${m}:${sec}`;
            };

            // --- ACTIONS ---
            const handleAddStaff = () => {
                const name = prompt("Enter Full Name:");
                if (name) {
                    const newStaff = {
                        id: Date.now(),
                        name,
                        role: "New Associate",
                        dept: "General",
                        rate: 20,
                        hours: 0,
                        absence: 0,
                        status: "Active"
                    };
                    setEmployees([...employees, newStaff]);
                }
            };

            const triggerSync = (id) => {
                setSyncingIds(prev => new Set(prev).add(id));
                setTimeout(() => {
                    setSyncingIds(prev => {
                        const next = new Set(prev);
                        next.delete(id);
                        return next;
                    });
                    setSyncedIds(prev => new Set(prev).add(id));
                }, 1500);
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-72 glass-panel text-slate-400 flex flex-col shrink-0">
                        <div className="p-8 border-b border-white/5">
                            <div className="flex items-center gap-3">
                                <div className="h-10 w-10 bg-sky-500 rounded-xl flex items-center justify-center shadow-lg shadow-sky-500/40">
                                    <i data-lucide="mountain" className="text-white w-6 h-6"></i>
                                </div>
                                <div>
                                    <h1 className="text-white font-extrabold tracking-tight text-xl">ALPINE CORE</h1>
                                    <p className="text-[10px] font-black text-sky-400 tracking-[0.2em] uppercase">Admin Subsidiary</p>
                                </div>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                            <p className="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Staffing Console</p>
                            {[
                                { id: 'HCM', icon: 'users', label: 'HCM Directory' },
                                { id: 'Absence', icon: 'calendar-off', label: 'Absence Mgmt' },
                                { id: 'Time', icon: 'timer', label: 'Live Timekeeping' },
                                { id: 'Payroll', icon: 'banknote', label: 'Payroll & QB' }
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${activeTab === item.id ? 'alpine-nav-active text-white' : 'hover:bg-white/5 hover:text-slate-200'}`}>
                                    <i data-lucide={item.icon} className={`w-4 h-4 mr-3 ${activeTab === item.id ? 'text-sky-400' : 'text-slate-500'}`}></i> 
                                    {item.label}
                                </button>
                            ))}
                        </nav>

                        <div className="p-6 border-t border-white/5 bg-black/20">
                            <div className="flex items-center gap-3">
                                <div className="h-9 w-9 rounded-full bg-gradient-to-tr from-slate-700 to-slate-500 flex items-center justify-center border border-white/10 text-[10px] font-bold text-white uppercase">AV</div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-xs font-bold text-white truncate text-slate-200">Alpine Executive</p>
                                    <p className="text-[10px] text-slate-500 truncate italic underline">alpine-virtualstaffing.com</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <div className="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
                        <header className="h-20 bg-white/70 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 shrink-0 sticky top-0 z-20">
                            <div className="flex items-center gap-3">
                                <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase">Workspace</span>
                                <i data-lucide="chevron-right" className="w-4 h-4 text-slate-300"></i>
                                <span className="text-sm font-extrabold text-slate-900 uppercase tracking-tight">{activeTab}</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-2 bg-emerald-50 border border-emerald-100 px-3 py-1.5 rounded-full">
                                    <span className="h-2 w-2 rounded-full bg-emerald-500 animate-pulse-soft"></span>
                                    <span className="text-[10px] font-black text-emerald-700 uppercase tracking-tighter">QB API: Connected</span>
                                </div>
                                <div className="h-10 w-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-400">
                                    <i data-lucide="bell" className="w-5 h-5"></i>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-10">
                            {/* --- HCM MODULE --- */}
                            {activeTab === 'HCM' && (
                                <div className="max-w-6xl mx-auto space-y-8 animate-in fade-in duration-500">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <h2 className="text-4xl font-black text-slate-900 tracking-tighter">Human Capital Management</h2>
                                            <p className="text-slate-500 font-medium mt-1 uppercase text-[11px] tracking-widest">Global Talent Roster</p>
                                        </div>
                                        <button onClick={handleAddStaff} className="bg-slate-900 text-white px-6 py-3 rounded-2xl text-sm font-bold hover:bg-slate-800 transition-all shadow-xl shadow-slate-900/20 flex items-center gap-2">
                                            <i data-lucide="plus" className="w-4 h-4"></i> Add Associate
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        {[
                                            { label: 'Total Staff', val: employees.length, icon: 'users', color: 'blue' },
                                            { label: 'Active Depts', val: '4', icon: 'layers', color: 'purple' },
                                            { label: 'New Hires (MTD)', val: '2', icon: 'trending-up', color: 'emerald' }
                                        ].map((stat, i) => (
                                            <div key={i} className="bg-white p-6 rounded-3xl stat-card shadow-sm flex items-center gap-5">
                                                <div className={`p-4 bg-${stat.color}-50 text-${stat.color}-600 rounded-2xl`}><i data-lucide={stat.icon}></i></div>
                                                <div><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{stat.label}</p><p className="text-2xl font-black text-slate-900">{stat.val}</p></div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50/50 border-b border-slate-100">
                                                <tr>
                                                    <th className="px-8 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Full Name / Profile</th>
                                                    <th className="px-8 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Division</th>
                                                    <th className="px-8 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-right">Records</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {employees.map(e => (
                                                    <tr key={e.id} className="hover:bg-slate-50/50 transition-colors group">
                                                        <td className="px-8 py-6">
                                                            <div className="flex items-center gap-4">
                                                                <div className="h-11 w-11 rounded-2xl bg-slate-100 text-slate-400 flex items-center justify-center font-bold">{e.name[0]}</div>
                                                                <div><p className="font-bold text-slate-900">{e.name}</p><p className="text-xs text-slate-500 font-medium italic">{e.role}</p></div>
                                                            </div>
                                                        </td>
                                                        <td className="px-8 py-6">
                                                            <span className="px-3 py-1 bg-white border border-slate-200 rounded-full text-[10px] font-bold text-slate-600 uppercase tracking-tight">{e.dept}</span>
                                                        </td>
                                                        <td className="px-8 py-6 text-right">
                                                            <button className="text-slate-300 hover:text-slate-900 transition-colors"><i data-lucide="external-link" className="w-4 h-4"></i></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* --- TIMEKEEPING MODULE --- */}
                            {activeTab === 'Time' && (
                                <div className="max-w-2xl mx-auto py-12 animate-in slide-in-from-bottom-8 duration-500">
                                    <div className="bg-white rounded-[3rem] border border-slate-200 shadow-2xl p-12 text-center relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-sky-400 to-blue-600"></div>
                                        <h3 className="text-[11px] font-black text-sky-600 uppercase tracking-[0.3em] mb-8">Admin Work Session</h3>
                                        
                                        <div className="text-8xl font-black text-slate-900 tracking-tighter tabular-nums mb-4">
                                            {formatDuration(sessionSeconds)}
                                        </div>
                                        
                                        <p className="text-slate-400 text-sm font-medium mb-12 italic">Currently recording shift for: <span className="text-slate-900 font-bold not-italic">Alpine Virtual Executive</span></p>

                                        <button onClick={() => { setIsClockedIn(!isClockedIn); if(isClockedIn) setSessionSeconds(0); }}
                                            className={`w-full py-6 rounded-[2rem] font-black text-lg transition-all transform active:scale-[0.97] ${isClockedIn ? 'bg-rose-50 text-rose-600 border-2 border-rose-200 hover:bg-rose-100' : 'bg-slate-900 text-white shadow-2xl shadow-slate-900/30 hover:bg-slate-800'}`}>
                                            {isClockedIn ? 'END SHIFT & LOG TIME' : 'START DIGITAL PUNCH'}
                                        </button>
                                        
                                        <div className="mt-10 grid grid-cols-2 gap-4">
                                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Status</p>
                                                <p className="font-bold text-slate-900 uppercase text-xs tracking-tighter">{isClockedIn ? "Recording Live" : "Offline"}</p>
                                            </div>
                                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Verified By</p>
                                                <p className="font-bold text-slate-900 uppercase text-xs tracking-tighter italic">Alpine Core AI</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --- PAYROLL MODULE --- */}
                            {activeTab === 'Payroll' && (
                                <div className="max-w-6xl mx-auto space-y-8 animate-in fade-in duration-500">
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <h2 className="text-3xl font-black text-slate-900 tracking-tight">Payroll Ledger</h2>
                                            <p className="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Calculated from Time & Absence Data</p>
                                        </div>
                                        <div className="flex gap-4">
                                            <div className="bg-white px-6 py-4 rounded-[1.5rem] border border-slate-200">
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Liability</p>
                                                <p className="text-2xl font-black text-blue-600 tracking-tighter">
                                                    ${employees.reduce((acc, e) => acc + calculateGross(e.rate, e.hours, e.absence), 0).toLocaleString()}
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50/50 border-b border-slate-100">
                                                <tr>
                                                    <th className="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Associate</th>
                                                    <th className="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Net Hours</th>
                                                    <th className="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Absence Impact</th>
                                                    <th className="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Gross Pay</th>
                                                    <th className="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-right">QuickBooks Status</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50 font-medium">
                                                {employees.map(e => {
                                                    const isSyncing = syncingIds.has(e.id);
                                                    const isSynced = syncedIds.has(e.id);
                                                    const totalPay = calculateGross(e.rate, e.hours, e.absence);
                                                    
                                                    return (
                                                        <tr key={e.id} className="hover:bg-slate-50/40 transition-all group">
                                                            <td className="px-8 py-6">
                                                                <p className="font-bold text-slate-900 italic tracking-tight">{e.name}</p>
                                                                <p className="text-[10px] text-slate-400 uppercase font-black tracking-widest">Rate: ${e.rate}/hr</p>
                                                            </td>
                                                            <td className="px-8 py-6 text-center text-slate-600 font-bold">{e.hours}h</td>
                                                            <td className="px-8 py-6 text-center">
                                                                <span className={e.absence > 0 ? "px-2 py-1 bg-rose-50 text-rose-600 rounded text-[10px] font-black border border-rose-100" : "text-slate-300 text-xs"}>
                                                                    {e.absence > 0 ? `-${e.absence * 8}h Absence` : 'Perfect Attendance'}
                                                                </span>
                                                            </td>
                                                            <td className="px-8 py-6">
                                                                <div className="text-lg font-black text-slate-900 tracking-tighter">${totalPay.toLocaleString()}</div>
                                                            </td>
                                                            <td className="px-8 py-6 text-right">
                                                                {isSynced ? (
                                                                    <div className="flex items-center justify-end gap-2 text-emerald-600 font-black text-[10px] uppercase tracking-widest">
                                                                        <i data-lucide="check-circle" className="w-4 h-4"></i> Ledger Updated
                                                                    </div>
                                                                ) : (
                                                                    <button onClick={() => triggerSync(e.id)} disabled={isSyncing}
                                                                        className="btn-qb text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 ml-auto disabled:opacity-50">
                                                                        {isSyncing ? 'TRANSMITTING...' : 'SYNC TO QB'}
                                                                        <i data-lucide="refresh-ccw" className={`w-3 h-3 ${isSyncing ? 'animate-spin' : ''}`}></i>
                                                                    </button>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="bg-amber-50 border-2 border-dashed border-amber-200 p-6 rounded-[2rem] flex items-center gap-4">
                                        <div className="bg-amber-100 p-3 rounded-full text-amber-600"><i data-lucide="alert-triangle"></i></div>
                                        <div>
                                            <p className="text-sm font-bold text-amber-900 tracking-tight italic text-amber-900">Wait! One Associate has an active Absence request.</p>
                                            <p className="text-[11px] text-amber-700 font-medium">Verify Absence Module before finalizing Global QuickBooks Journal Entry.</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                            
                            {activeTab === 'Absence' && (
                                <div className="max-w-4xl mx-auto py-20 text-center space-y-4">
                                    <div className="h-20 w-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto text-slate-300">
                                        <i data-lucide="calendar-x" className="w-10 h-10"></i>
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-900 tracking-tight italic underline">Attendance Reconciliation</h2>
                                    <p className="text-slate-500 max-w-md mx-auto text-sm font-medium">This module cross-references staff PTO with the Payroll Ledger to prevent overpayment.</p>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
