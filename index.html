<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine Core | Virtual Staffing Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .nav-active { background: #0f172a; border-left: 4px solid #38bdf8; color: white !important; }
        .alpine-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        /* Prevent layout shift before React loads */
        #root:empty { background: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #root:empty::after { content: "Loading Alpine Core..."; font-weight: bold; color: #64748b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('HCM');
            const [employees, setEmployees] = useState([
                { id: 1, name: "Sarah Miller", role: "Executive VA", status: "Active" },
                { id: 2, name: "Marcus Wright", role: "Operations Lead", status: "Active" }
            ]);

            // Fix for Lucide Icons in Standalone React
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (window.lucide) window.lucide.createIcons();
                }, 100);
                return () => clearTimeout(timer);
            }, [activeTab, employees]);

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-64 alpine-gradient text-slate-300 flex flex-col shrink-0">
                        <div className="p-6 border-b border-slate-700/50">
                            <div className="flex items-center gap-3 text-white">
                                <div className="p-2 bg-sky-500 rounded-lg"><i data-lucide="mountain" className="w-5 h-5"></i></div>
                                <div><h1 className="font-bold tracking-tight">ALPINE CORE</h1><p className="text-[10px] text-sky-400 font-bold uppercase">Staffing SaaS</p></div>
                            </div>
                        </div>
                        <nav className="flex-1 px-3 py-4 space-y-1">
                            {['HCM', 'Time', 'Payroll'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)}
                                    className={`w-full flex items-center px-4 py-3 rounded-md text-sm transition-all ${activeTab === tab ? 'nav-active' : 'hover:bg-slate-800'}`}>
                                    <i data-lucide={tab === 'HCM' ? 'users' : tab === 'Time' ? 'clock' : 'banknote'} className="w-4 h-4 mr-3"></i> {tab} Portal
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* CONTENT */}
                    <main className="flex-1 flex flex-col bg-slate-50">
                        <header className="h-16 bg-white border-b flex items-center justify-between px-8">
                            <div className="text-xs font-bold text-slate-400 uppercase">Alpine Virtual Subsidiary</div>
                            <div className="bg-green-50 text-green-700 px-3 py-1 rounded-full text-[10px] font-bold border border-green-200">QB CONNECTED</div>
                        </header>
                        <div className="p-8 overflow-auto">
                            {activeTab === 'HCM' && (
                                <div className="max-w-4xl mx-auto bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                    <h2 className="text-xl font-bold mb-4">Staff Directory</h2>
                                    <ul className="divide-y">
                                        {employees.map(e => (
                                            <li key={e.id} className="py-3 flex justify-between">
                                                <div><p className="font-bold text-slate-800">{e.name}</p><p className="text-xs text-slate-500">{e.role}</p></div>
                                                <span className="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded h-fit">{e.status}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            )}
                            {activeTab !== 'HCM' && (
                                <div className="text-center py-20 text-slate-400 italic">
                                    Module {activeTab} ready for Supabase integration.
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        // React 18 Mounting
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
