<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine Core | Staffing Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .nav-active { background: #0f172a; border-left: 4px solid #38bdf8; color: white !important; }
        .alpine-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('HCM');
            const [employees, setEmployees] = useState([
                { id: 1, name: "Sarah Miller", role: "Executive VA", status: "Active", email: "sarah@alpine.com" },
                { id: 2, name: "Marcus Wright", role: "Operations Lead", status: "Active", email: "marcus@alpine.com" }
            ]);
            
            // Timekeeping States
            const [isClockedIn, setIsClockedIn] = useState(false);
            const [seconds, setSeconds] = useState(0);
            
            // Payroll States
            const [syncStep, setSyncStep] = useState('idle'); // idle, syncing, complete

            useEffect(() => {
                window.lucide?.createIcons();
                let interval;
                if (isClockedIn) {
                    interval = setInterval(() => setSeconds(s => s + 1), 1000);
                } else {
                    setSeconds(0);
                }
                return () => clearInterval(interval);
            }, [activeTab, employees, isClockedIn, syncStep]);

            const formatTime = (s) => {
                const h = Math.floor(s / 3600).toString().padStart(2, '0');
                const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
                const sec = (s % 60).toString().padStart(2, '0');
                return `${h}:${m}:${sec}`;
            };

            const handleAddEmployee = () => {
                const name = prompt("Employee Full Name:");
                const role = prompt("Job Role (e.g. Virtual Assistant):");
                if (name && role) {
                    setEmployees([...employees, { id: Date.now(), name, role, status: "Active", email: `${name.toLowerCase().replace(' ', '.')}@alpine.com` }]);
                }
            };

            const triggerSync = () => {
                setSyncStep('syncing');
                setTimeout(() => setSyncStep('complete'), 2000);
                setTimeout(() => setSyncStep('idle'), 5000);
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* ALPINE SIDEBAR */}
                    <aside className="w-64 alpine-gradient text-slate-300 flex flex-col shrink-0">
                        <div className="p-6 border-b border-slate-700/50">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-sky-500 rounded-lg shadow-lg shadow-sky-500/20">
                                    <i data-lucide="mountain" className="w-5 h-5 text-white"></i>
                                </div>
                                <div>
                                    <h1 className="text-white font-bold tracking-tight">ALPINE CORE</h1>
                                    <p className="text-[10px] text-sky-400 font-bold uppercase tracking-widest">Subsidiary of AV</p>
                                </div>
                            </div>
                        </div>
                        
                        <nav className="flex-1 px-3 py-4 space-y-1">
                            {[
                                { id: 'HCM', icon: 'users', label: 'HCM Portal' },
                                { id: 'Absence', icon: 'calendar-days', label: 'Absence' },
                                { id: 'Time', icon: 'timer', label: 'Timekeeping' },
                                { id: 'Payroll', icon: 'badge-dollar-sign', label: 'Payroll & QB' }
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center px-4 py-3 rounded-md text-sm font-medium transition-all hover:text-white ${activeTab === item.id ? 'nav-active shadow-sm' : 'hover:bg-slate-800/50'}`}>
                                    <i data-lucide={item.icon} className="w-4 h-4 mr-3"></i> {item.label}
                                </button>
                            ))}
                        </nav>
                        
                        <div className="p-4 bg-slate-900/50 border-t border-slate-700/50">
                            <div className="flex items-center gap-3 px-2">
                                <div className="w-8 h-8 rounded-full bg-slate-700 border border-slate-600 flex items-center justify-center text-[10px] font-bold">AV</div>
                                <div className="overflow-hidden">
                                    <p className="text-xs font-bold text-white truncate">Admin User</p>
                                    <p className="text-[10px] text-slate-500 truncate">admin@alpine-virtual.com</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN AREA */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8">
                            <div className="flex items-center gap-2 text-xs font-semibold text-slate-400">
                                <i data-lucide="layout-grid" className="w-3 h-3"></i>
                                <span>DASHBOARD</span>
                                <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                <span className="text-slate-900">{activeTab}</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200">
                                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                    <span className="text-[10px] font-bold text-slate-600">QB SYNC ACTIVE</span>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-8">
                            {activeTab === 'HCM' && (
                                <div className="max-w-5xl mx-auto space-y-6">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <h2 className="text-2xl font-bold text-slate-900 tracking-tight">Employee Directory</h2>
                                            <p className="text-slate-500 text-sm">Manage your Alpine Virtual staff profiles.</p>
                                        </div>
                                        <button onClick={handleAddEmployee} className="bg-sky-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-sky-700 shadow-md shadow-sky-600/20 transition-all flex items-center gap-2">
                                            <i data-lucide="user-plus" className="w-4 h-4"></i> Add Staff
                                        </button>
                                    </div>

                                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b border-slate-200">
                                                    <th className="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Name</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Role</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Status</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {employees.map(e => (
                                                    <tr key={e.id} className="hover:bg-slate-50 transition-colors group">
                                                        <td className="px-6 py-4">
                                                            <div className="font-semibold text-slate-900">{e.name}</div>
                                                            <div className="text-xs text-slate-500">{e.email}</div>
                                                        </td>
                                                        <td className="px-6 py-4 text-sm text-slate-600">{e.role}</td>
                                                        <td className="px-6 py-4">
                                                            <span className="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-green-100 text-green-700 border border-green-200">
                                                                {e.status}
                                                            </span>
                                                        </td>
                                                        <td className="px-6 py-4">
                                                            <button className="text-slate-400 hover:text-slate-900 transition-colors">
                                                                <i data-lucide="more-horizontal" className="w-5 h-5"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'Time' && (
                                <div className="max-w-xl mx-auto py-12">
                                    <div className="bg-white rounded-3xl border border-slate-200 shadow-2xl overflow-hidden">
                                        <div className="p-12 text-center space-y-8">
                                            <div className="space-y-2">
                                                <h3 className="text-xs font-bold text-sky-600 uppercase tracking-[0.2em]">Live Session</h3>
                                                <div className="text-7xl font-light text-slate-900 tracking-tighter tabular-nums">
                                                    {formatTime(seconds)}
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Shift Start</p>
                                                    <p className="text-lg font-bold text-slate-700">{isClockedIn ? "09:00 AM" : "--:--"}</p>
                                                </div>
                                                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Today's Total</p>
                                                    <p className="text-lg font-bold text-slate-700">0.0h</p>
                                                </div>
                                            </div>

                                            <button onClick={() => setIsClockedIn(!isClockedIn)}
                                                className={`w-full py-5 rounded-2xl font-bold text-white transition-all transform active:scale-[0.98] ${isClockedIn ? 'bg-rose-500 hover:bg-rose-600 shadow-xl shadow-rose-200' : 'bg-slate-900 hover:bg-slate-800 shadow-xl shadow-slate-300'}`}>
                                                {isClockedIn ? 'End Shift' : 'Start My Shift'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'Payroll' && (
                                <div className="max-w-4xl mx-auto space-y-6">
                                    <h2 className="text-2xl font-bold">Payroll & QuickBooks Center</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
                                            <div>
                                                <div className="w-12 h-12 bg-green-100 text-green-600 rounded-xl flex items-center justify-center mb-4">
                                                    <i data-lucide="refresh-cw" className="w-6 h-6"></i>
                                                </div>
                                                <h3 className="text-lg font-bold mb-2 text-slate-900">QuickBooks Integration</h3>
                                                <p className="text-sm text-slate-500 leading-relaxed">Transmit validated timesheets directly to your QuickBooks Online account for automated journal entries.</p>
                                            </div>
                                            <div className="mt-8 space-y-4">
                                                {syncStep === 'syncing' && (
                                                    <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                                        <div className="bg-green-500 h-full w-1/2 animate-[progress_2s_ease-in-out]"></div>
                                                    </div>
                                                )}
                                                <button onClick={triggerSync} disabled={syncStep === 'syncing'}
                                                    className="w-full py-3 bg-[#2ca01c] text-white rounded-xl font-bold hover:bg-green-700 transition-all disabled:opacity-50 flex items-center justify-center gap-2">
                                                    {syncStep === 'syncing' ? 'Syncing...' : syncStep === 'complete' ? 'Sync Successful' : 'Push Data to QuickBooks'}
                                                    {syncStep === 'complete' && <i data-lucide="check-circle" className="w-4 h-4"></i>}
                                                </button>
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                            <h3 className="text-lg font-bold mb-4">Pending Payroll</h3>
                                            <div className="space-y-4">
                                                {[1, 2].map(i => (
                                                    <div key={i} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-10 h-10 rounded-lg bg-white border border-slate-200 flex items-center justify-center font-bold text-slate-400">#</div>
                                                            <div>
                                                                <p className="text-xs font-bold text-slate-900 tracking-tight">Period: Mar 01 - 15</p>
                                                                <p className="text-[10px] text-slate-500">Unprocessed Earnings</p>
                                                            </div>
                                                        </div>
                                                        <p className="text-sm font-black text-slate-900">$2,450.00</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
